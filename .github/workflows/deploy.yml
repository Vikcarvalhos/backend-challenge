name: Deploy AWS

on:
  workflow_dispatch:
    inputs:
      apply_infrastructure:
        description: "Apply Terraform changes and push the Docker image to ECR"
        required: true
        type: boolean
        default: false
      image_tag:
        description: "Docker image tag. Defaults to the commit SHA when empty."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: jwt-validator
  ENVIRONMENT: dev
  TERRAFORM_VERSION: 1.15.6

jobs:
  deploy:
    name: Build, plan and optional deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven Wrapper executable
        working-directory: app
        run: chmod +x mvnw

      - name: Run tests
        working-directory: app
        run: ./mvnw -B test

      - name: Package application
        working-directory: app
        run: ./mvnw -B package -DskipTests

      - name: Build Docker image
        run: docker build -t jwt-validator:${{ steps.image.outputs.tag }} ./app

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform fmt
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/terraform
        run: terraform plan -var="image_tag=${{ steps.image.outputs.tag }}" -out=tfplan

      - name: Export Terraform plan
        working-directory: infra/terraform
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/terraform/tfplan.txt
          if-no-files-found: error

      - name: Bootstrap ECR
        if: ${{ inputs.apply_infrastructure }}
        working-directory: infra/terraform
        run: terraform apply -auto-approve -target=aws_ecr_repository.app -target=aws_ecr_lifecycle_policy.app

      - name: Login to Amazon ECR
        if: ${{ inputs.apply_infrastructure }}
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Docker image to ECR
        if: ${{ inputs.apply_infrastructure }}
        shell: bash
        run: |
          ECR_REPOSITORY="${PROJECT_NAME}-${ENVIRONMENT}"
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"
          docker tag "jwt-validator:${{ steps.image.outputs.tag }}" "$IMAGE_URI"
          docker push "$IMAGE_URI"

      - name: Terraform apply
        if: ${{ inputs.apply_infrastructure }}
        working-directory: infra/terraform
        run: terraform apply -auto-approve -var="image_tag=${{ steps.image.outputs.tag }}"
