spring:
  application:
    name: jwt-validator

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: 1.0

info:
  app:
    name: jwt-validator
    description: API para validacao de JWT conforme desafio tecnico
    version: 0.0.1-SNAPSHOT

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [traceId=%X{traceId:-}, spanId=%X{spanId:-}] ${PID:- } --- [%15.15t] %-40.40logger{39} : %m%n%wEx"
